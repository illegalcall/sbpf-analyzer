<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a3a"/>
      <stop offset="100%" style="stop-color:#1a0d37"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"/>
      <stop offset="100%" style="stop-color:#0d3717"/>
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a1a"/>
      <stop offset="100%" style="stop-color:#37200d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">sbpf-analyzer — Architecture</text>

  <!-- Input: .so file -->
  <rect x="30" y="70" width="140" height="60" rx="8" fill="url(#box1)" stroke="#30a14e" stroke-width="1.5"/>
  <text x="100" y="97" text-anchor="middle" fill="#30a14e" font-size="13" font-weight="bold">.so file</text>
  <text x="100" y="117" text-anchor="middle" fill="#8b949e" font-size="10">sBPF ELF binary</text>

  <!-- Arrow -->
  <line x1="170" y1="100" x2="210" y2="100" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#484f58"/></marker></defs>

  <!-- Stage 1: Loader -->
  <rect x="215" y="65" width="160" height="70" rx="8" fill="url(#box1)" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="295" y="90" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">loader.rs</text>
  <text x="295" y="107" text-anchor="middle" fill="#8b949e" font-size="9">ELF parse via solana-sbpf</text>
  <text x="295" y="122" text-anchor="middle" fill="#8b949e" font-size="9">Executable → Analysis</text>

  <!-- Arrow -->
  <line x1="375" y1="100" x2="415" y2="100" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Stage 2: Analyzer -->
  <rect x="420" y="65" width="180" height="70" rx="8" fill="url(#box2)" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="510" y="90" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">analyzer.rs</text>
  <text x="510" y="107" text-anchor="middle" fill="#8b949e" font-size="9">CFG walk · SCC loop detect</text>
  <text x="510" y="122" text-anchor="middle" fill="#8b949e" font-size="9">Worst-case DAG · CU estimate</text>

  <!-- Arrow -->
  <line x1="600" y1="100" x2="640" y2="100" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Stage 3: Output -->
  <rect x="645" y="65" width="230" height="70" rx="8" fill="url(#box3)" stroke="#30a14e" stroke-width="1.5"/>
  <text x="760" y="90" text-anchor="middle" fill="#30a14e" font-size="12" font-weight="bold">report.rs / baseline.rs</text>
  <text x="760" y="107" text-anchor="middle" fill="#8b949e" font-size="9">Terminal report · JSON output</text>
  <text x="760" y="122" text-anchor="middle" fill="#8b949e" font-size="9">Baseline diff · CI gates</text>

  <!-- Sub-modules row -->
  <!-- Cost Model -->
  <rect x="215" y="170" width="160" height="80" rx="8" fill="url(#box4)" stroke="#d29922" stroke-width="1.5"/>
  <text x="295" y="195" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">cost_model.rs</text>
  <text x="295" y="212" text-anchor="middle" fill="#8b949e" font-size="9">38 syscalls · Murmur3 hash</text>
  <text x="295" y="227" text-anchor="middle" fill="#8b949e" font-size="9">Per-byte costs · Categories</text>
  <text x="295" y="242" text-anchor="middle" fill="#8b949e" font-size="9">Agave v2.1 cost model</text>

  <!-- Patterns -->
  <rect x="420" y="170" width="180" height="80" rx="8" fill="url(#box4)" stroke="#d29922" stroke-width="1.5"/>
  <text x="510" y="195" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">patterns.rs</text>
  <text x="510" y="212" text-anchor="middle" fill="#8b949e" font-size="9">MUL→shift · DIV→shift</text>
  <text x="510" y="227" text-anchor="middle" fill="#8b949e" font-size="9">CPI-in-loop · Unbounded loops</text>
  <text x="510" y="242" text-anchor="middle" fill="#8b949e" font-size="9">Expensive crypto detection</text>

  <!-- Debug Info -->
  <rect x="645" y="170" width="230" height="80" rx="8" fill="url(#box4)" stroke="#d29922" stroke-width="1.5"/>
  <text x="760" y="195" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">debug_info.rs</text>
  <text x="760" y="212" text-anchor="middle" fill="#8b949e" font-size="9">DWARF line tables · Source maps</text>
  <text x="760" y="227" text-anchor="middle" fill="#8b949e" font-size="9">Function name demangling</text>
  <text x="760" y="242" text-anchor="middle" fill="#8b949e" font-size="9">PC → file:line resolution</text>

  <!-- Connecting lines from cost_model/patterns to analyzer -->
  <line x1="295" y1="170" x2="480" y2="135" stroke="#484f58" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="510" y1="170" x2="510" y2="135" stroke="#484f58" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Pipeline summary -->
  <rect x="30" y="290" width="845" height="100" rx="8" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="315" fill="#58a6ff" font-size="12" font-weight="bold">Pipeline</text>

  <rect x="50" y="330" width="100" height="40" rx="6" fill="#0d2137" stroke="#58a6ff" stroke-width="1"/>
  <text x="100" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">Parse ELF</text>
  <line x1="150" y1="350" x2="175" y2="350" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="180" y="330" width="100" height="40" rx="6" fill="#0d2137" stroke="#58a6ff" stroke-width="1"/>
  <text x="230" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">Build CFG</text>
  <line x1="280" y1="350" x2="305" y2="350" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="310" y="330" width="100" height="40" rx="6" fill="#1a0d37" stroke="#bc8cff" stroke-width="1"/>
  <text x="360" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">Detect Loops</text>
  <line x1="410" y1="350" x2="435" y2="350" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="440" y="330" width="100" height="40" rx="6" fill="#1a0d37" stroke="#bc8cff" stroke-width="1"/>
  <text x="490" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">Estimate CU</text>
  <line x1="540" y1="350" x2="565" y2="350" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="570" y="330" width="100" height="40" rx="6" fill="#37200d" stroke="#d29922" stroke-width="1"/>
  <text x="620" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">Find Patterns</text>
  <line x1="670" y1="350" x2="695" y2="350" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="700" y="330" width="160" height="40" rx="6" fill="#0d3717" stroke="#30a14e" stroke-width="1"/>
  <text x="780" y="355" text-anchor="middle" fill="#c9d1d9" font-size="10">Report + CI Gate</text>

  <!-- Key metrics -->
  <rect x="30" y="420" width="200" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="130" y="445" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">Cost Model</text>
  <text x="130" y="465" text-anchor="middle" fill="#8b949e" font-size="10">38 Solana syscalls</text>
  <text x="130" y="482" text-anchor="middle" fill="#8b949e" font-size="10">Agave v2.1 compute budget</text>

  <rect x="250" y="420" width="200" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="445" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">Analysis</text>
  <text x="350" y="465" text-anchor="middle" fill="#8b949e" font-size="10">SCC loop detection</text>
  <text x="350" y="482" text-anchor="middle" fill="#8b949e" font-size="10">Interprocedural CU propagation</text>

  <rect x="470" y="420" width="200" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="570" y="445" text-anchor="middle" fill="#d29922" font-size="11" font-weight="bold">7 Pattern Detectors</text>
  <text x="570" y="465" text-anchor="middle" fill="#8b949e" font-size="10">CPI-in-loop, unbounded loops</text>
  <text x="570" y="482" text-anchor="middle" fill="#8b949e" font-size="10">MUL/DIV optimization hints</text>

  <rect x="690" y="420" width="185" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="782" y="445" text-anchor="middle" fill="#30a14e" font-size="11" font-weight="bold">CI Integration</text>
  <text x="782" y="465" text-anchor="middle" fill="#8b949e" font-size="10">--fail-above threshold</text>
  <text x="782" y="482" text-anchor="middle" fill="#8b949e" font-size="10">--fail-regression baseline diff</text>
</svg>
